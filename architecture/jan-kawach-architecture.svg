<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2d3748" />
    </marker>
    <style>
      .title { font: 700 20px sans-serif; fill: #1a202c }
      .box { fill: #ffffff; stroke: #2d3748; stroke-width:1.5 }
      .sub { fill: #f7fafc; stroke: #2b6cb0; stroke-width:1.2 }
      .backend { fill: #fff7ed; stroke:#dd6b20 }
      .frontend { fill: #e6fffa; stroke:#059669 }
      .db { fill: #f0f9ff; stroke:#0ea5e9 }
      .ext { fill: #fff1f2; stroke:#be185d }
      .text { font: 600 13px/1.1 sans-serif; fill: #1a202c }
      .small { font: 500 12px sans-serif; fill: #2d3748 }
    </style>
  </defs>

  <!-- Title -->
  <text x="20" y="34" class="title">JAN-KAWACH — System Architecture</text>
  <text x="20" y="56" class="small">Generated diagram representing frontend, backend, services, databases, external integrations and dataflows.</text>

  <!-- Clients -->
  <rect x="24" y="110" width="200" height="140" rx="8" class="sub" />
  <text x="34" y="138" class="text">Clients</text>
  <text x="34" y="158" class="small">- Web browser (React)</text>
  <text x="34" y="176" class="small">- Mobile (PWA) / Admin</text>

  <!-- Frontend -->
  <rect x="250" y="80" width="320" height="180" rx="8" class="frontend" />
  <text x="270" y="108" class="text">Frontend (React)</text>
  <text x="270" y="130" class="small">`src/` components &amp; pages</text>
  <text x="270" y="148" class="small">Service Worker (public/) &amp; SoundManager</text>
  <text x="270" y="166" class="small">Sockets (src/socket.js)</text>

  <!-- Backend -->
  <rect x="600" y="30" width="540" height="360" rx="10" class="backend" />
  <text x="620" y="58" class="text">Backend (Node / Express)</text>
  <text x="620" y="78" class="small">`backend/server.js`, `routes/`, `middleware/`</text>

  <!-- Backend internals -->
  <rect x="640" y="110" width="240" height="70" rx="6" class="box" />
  <text x="654" y="136" class="small">Routes & Controllers</text>
  <rect x="900" y="110" width="220" height="70" rx="6" class="box" />
  <text x="914" y="136" class="small">Services</text>
  <rect x="640" y="200" width="240" height="120" rx="6" class="box" />
  <text x="654" y="226" class="small">Models &amp; DB Layer (`models/`)</text>
  <rect x="900" y="200" width="220" height="120" rx="6" class="box" />
  <text x="914" y="226" class="small">Special Components</text>
  <text x="914" y="246" class="small">- FraudDetectionEngine.js</text>
  <text x="914" y="264" class="small">- EvidenceBlockchain / Block</text>
  <text x="914" y="282" class="small">- Vault &amp; Uploads</text>

  <!-- Database -->
  <rect x="720" y="420" width="200" height="120" rx="8" class="db" />
  <text x="740" y="452" class="text">Database</text>
  <text x="740" y="474" class="small">MongoDB (e.g., `FraudDatabase`, `user`, `post`)</text>

  <!-- External Integrations -->
  <rect x="1160" y="120" width="220" height="260" rx="8" class="ext" />
  <text x="1180" y="152" class="text">External Integrations</text>
  <text x="1180" y="174" class="small">- SMS gateway (smsService)</text>
  <text x="1180" y="192" class="small">- WhatsApp provider</text>
  <text x="1180" y="210" class="small">- Web Push / Notifications</text>
  <text x="1180" y="228" class="small">- Third-party threat feeds</text>

  <!-- Arrows: Clients -> Frontend -->
  <line x1="224" y1="170" x2="250" y2="170" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Frontend -> Backend (HTTP + WebSocket) -->
  <line x1="570" y1="150" x2="600" y2="150" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)" />
  <text x="420" y="92" class="small">HTTPS / REST</text>
  <line x1="520" y1="220" x2="600" y2="220" stroke="#2d3748" stroke-dasharray="6,4" stroke-width="1.6" marker-end="url(#arrow)" />
  <text x="440" y="236" class="small">WebSocket (Realtime events)</text>

  <!-- Backend -> Database -->
  <line x1="860" y1="320" x2="860" y2="420" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)" />
  <text x="820" y="368" class="small">Read / Write</text>

  <!-- Backend -> External Integrations -->
  <line x1="1140" y1="250" x2="1160" y2="250" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)" />
  <text x="1040" y="238" class="small">API Calls / Webhooks</text>

  <!-- Frontend -> Service Worker / Monitoring -->
  <line x1="430" y1="240" x2="600" y2="340" stroke="#2d3748" stroke-width="1.6" marker-end="url(#arrow)" />
  <text x="470" y="268" class="small">Background sync / SW / Push</text>

  <!-- Backend -> Blockchain -->
  <line x1="1020" y1="260" x2="1060" y2="260" stroke="#2d3748" stroke-width="1.6" marker-end="url(#arrow)" />
  <text x="1022" y="280" class="small">Add evidence / blocks</text>

  <!-- Legend / Notes -->
  <rect x="24" y="720" width="1356" height="140" rx="8" fill="#f8fafc" stroke="#cbd5e1" />
  <text x="44" y="748" class="small">Notes: This diagram maps key components found in the repository: `src/` (frontend), `public/` (service workers &amp; static files), `backend/` (server, routes, services), `backend/blockchain/`, `backend/models/`, and `backend/services/` like `smsService.js` and `FraudDetectionEngine.js`.</text>
  <text x="44" y="770" class="small">You can edit labels/colors or request a PNG/PDF export. If you prefer a different layout (swimlanes, sequence), tell me which components to emphasize.</text>

</svg>